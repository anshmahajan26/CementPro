services:
  - type: web
    name: cement-ml-service
    runtime: python
    rootDir: ml-model
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9

  - type: web
    name: cement-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && cd ../frontend && npm install && VITE_API_URL=$VITE_API_URL npx vite build
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ML_API_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Set this in Render Dashboard → cement-backend → Environment
      # Value: https://cementpro-backend.onrender.com
      - key: VITE_API_URL
        sync: false
