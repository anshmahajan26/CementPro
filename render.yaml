services:
  - type: web
    name: cement-ml-service
    runtime: python
    rootDir: ml-model
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9

  - type: web
    name: cement-backend
    runtime: node
    rootDir: .
    buildCommand: npm install --prefix backend && npm install --prefix frontend && VITE_API_URL=$VITE_API_URL npm run build --prefix frontend
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ML_API_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
      # VITE_API_URL is used by the frontend build step above
      # Set this in Render Dashboard to: https://cementpro-backend.onrender.com
      - key: VITE_API_URL
        sync: false
