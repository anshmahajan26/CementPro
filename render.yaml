services:
  - type: web
    name: cement-ml-service
    runtime: python
    rootDir: ml-model
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9

  - type: web
    name: cement-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ML_API_URL
        sync: false

